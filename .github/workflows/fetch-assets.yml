# Einmaliger Hilfs-Workflow: lädt die generierten Website-Bilder vom CDN,
# optimiert sie und committet sie nach assets/. Kann nach erfolgreichem
# Lauf wieder entfernt werden.
name: Fetch website assets

on:
  push:
    branches:
      - claude/daimler-website-redesign-lu881y
    paths:
      - .github/workflows/fetch-assets.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download generated images
        run: |
          set -euo pipefail
          mkdir -p /tmp/img assets
          BASE="https://d8j0ntlcm91z4.cloudfront.net/user_3EfaPD3NJ6lU9EMsrAcoIvwpUMX"
          curl -fsSL "$BASE/hf_20260712_102820_a315622d-9104-4f55-b2fb-5135acd3baa5.png" -o /tmp/img/hero.png
          curl -fsSL "$BASE/hf_20260712_102756_c449ec9b-939a-44fd-acf4-71775e4b1d58.png" -o /tmp/img/still.png
          curl -fsSL "$BASE/hf_20260712_102803_7ce2f70e-0005-455e-ae06-c217e8f63782.png" -o /tmp/img/trauringe.png
          curl -fsSL "$BASE/hf_20260712_102814_d7b3cc77-e01e-49cf-b544-93bcd66fd08e.png" -o /tmp/img/uhren.png
          curl -fsSL "$BASE/hf_20260712_102826_739b23cd-9bbc-48e3-b47d-c1bd9b8c517f.png" -o /tmp/img/boutique.png

      - name: Optimize and place assets
        run: |
          set -euo pipefail
          pip install --quiet pillow
          python3 - <<'EOF'
          from PIL import Image

          def save(src, dst, width=None, crop=None):
              im = Image.open(src).convert('RGB')
              if crop:
                  im = im.crop(crop)
              if width and im.width > width:
                  im = im.resize((width, round(im.height * width / im.width)), Image.LANCZOS)
              im.save(dst, 'JPEG', quality=82, optimize=True, progressive=True)

          # Hero: Ketten-Portrait (4:5)
          save('/tmp/img/hero.png', 'assets/hero.jpg', 928)
          # OG-Bild: 16:9 Stillleben in voller Breite
          save('/tmp/img/still.png', 'assets/og.jpg', 1376)
          # Kollektion "Ketten & Schmuck": 4:5-Ausschnitt rechts aus dem Stillleben
          im = Image.open('/tmp/img/still.png')
          w, h = im.size
          cw = round(h * 4 / 5)
          right = w - 40
          save('/tmp/img/still.png', 'assets/schmuck.jpg', 800, crop=(right - cw, 0, right, h))
          save('/tmp/img/trauringe.png', 'assets/trauringe.jpg', 800)
          save('/tmp/img/uhren.png', 'assets/uhren.jpg', 800)
          save('/tmp/img/boutique.png', 'assets/boutique.jpg', 1100)
          EOF
          ls -la assets/

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          git commit -m "Add optimized website images"
          git push origin "HEAD:${{ github.ref_name }}"
