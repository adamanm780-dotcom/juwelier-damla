# Einmaliger Hilfs-Workflow: lädt die echten Laden-Fotos (Google-Business-
# Profil / Verzeichnis-Spiegel) herunter und committet sie nach research/photos/.
name: Fetch research pages

on:
  push:
    branches:
      - claude/daimler-website-redesign-lu881y
    paths:
      - .github/workflows/fetch-research.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download real store photos
        run: |
          set -uo pipefail
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          mkdir -p research/photos
          get () {
            curl -fsSL --compressed -H "User-Agent: $UA" "$2" -o "research/photos/$1" \
              && echo "OK $1 ($(stat -c%s research/photos/$1) bytes)" || echo "FAIL $1"
          }
          get gplace-main.jpg "https://lh3.googleusercontent.com/p/AF1QipNLwMtvulBVWdw3qXyRKLzU4_lL4QACzSAuT7UE=w1600-h1000-k-no"
          get w1.jpg "https://static.where-e.com/Germany/Juwelier-Damla-Wiesbaden_00625e26b281526f8a84ed4be77622de.jpg"
          get w2.jpg "https://static.where-e.com/Germany/Juwelier-Damla-Wiesbaden_1c278f5201654d6219702b1e9d493331.jpg"
          get w3.jpg "https://static.where-e.com/Germany/Juwelier-Damla-Wiesbaden_35fb529a476a860e4a820b6d35c62fe5.jpg"
          get w4.jpg "https://static.where-e.com/Germany/Juwelier-Damla-Wiesbaden_5528a38d686ef840ed62b1bf108df4e2.jpg"
          get w5.jpg "https://static.where-e.com/Germany/Juwelier-Damla-Wiesbaden_d6daf66f3577d65cf0d59ab696bf8bb1.jpg"
          ls -la research/photos/

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f research/photos
          git commit -m "Add real store photos" || echo "nothing to commit"
          git push origin "HEAD:${{ github.ref_name }}"
