# Einmaliger Hilfs-Workflow: rendert Recherche-Seiten mit headless Chrome
# und committet die DOM-Dumps nach research/out/. Wird danach entfernt.
name: Fetch research pages

on:
  push:
    branches:
      - claude/daimler-website-redesign-lu881y
    paths:
      - .github/workflows/fetch-research.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Render pages with headless Chrome
        run: |
          set -uo pipefail
          mkdir -p research/out
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"

          dump () {
            local name="$1" url="$2"
            echo "==> $name : $url"
            timeout 90 google-chrome --headless=new --no-sandbox --disable-gpu \
              --user-agent="$UA" --lang=de-DE --window-size=1400,2000 \
              --virtual-time-budget=15000 --dump-dom "$url" \
              > "research/out/$name" 2>/dev/null \
              && echo "OK $name ($(stat -c%s research/out/$name) bytes)" \
              || echo "FAIL $name"
          }

          # Google Maps (HTML enthält eingebettete Bewertungs- und Fotodaten)
          curl -fsSL --compressed -H "User-Agent: $UA" -H "Accept-Language: de-DE,de;q=0.9" \
            "https://www.google.com/maps/search/Juwelier+Damla+Wellritzstra%C3%9Fe+3+Wiesbaden?hl=de" \
            -o research/out/gmaps-search.html \
            && echo "OK gmaps-search.html ($(stat -c%s research/out/gmaps-search.html) bytes)" \
            || echo "FAIL gmaps-search.html"

          dump gmaps-rendered.html "https://www.google.com/maps/search/Juwelier+Damla+Wellritzstra%C3%9Fe+3+Wiesbaden?hl=de"
          dump toprated.html "https://www.top-rated.online/cities/Wiesbaden/place/p/13751172/Juwelier+Damla+Wiesbaden"
          dump wheree.html "https://juwelier-damla-wiesbaden.wheree.com/"
          dump nicelocal.html "https://en.nicelocal.com.de/wiesbaden/utility_service/juwelier_damla/"

          ls -la research/out/

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f research/out
          git commit -m "Add research downloads" || echo "nothing to commit"
          git push origin "HEAD:${{ github.ref_name }}"
